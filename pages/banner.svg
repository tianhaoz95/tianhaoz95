<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390">
  <defs>
    <style>
      .bg { fill: #0b0d12; }
      .card { fill: #12151c; stroke: #232733; stroke-width: 1; }
      .title { font: 600 20px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #e6e8ef; }
      .desc { font: 400 13px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #9aa3b2; }
      .tag { font: 500 11px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #7c9bff; }
      .tagbg { fill: rgba(124,155,255,0.12); stroke: rgba(124,155,255,0.35); stroke-width: 1; }
      .heading { font: 600 16px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #9aa3b2; }
    </style>
  </defs>

  <rect class="bg" width="880" height="390" rx="14" />
  <text x="24" y="30" class="heading">PROJECTS — click to explore</text>

  <!-- Meowtrix card -->
  <rect class="card" x="24" y="46" width="404" height="150" rx="12" />
  <text x="48" y="86" class="title">🐾 Meowtrix</text>
  <text x="48" y="112" class="desc">
    <tspan x="48" dy="0">Browser-based remote workspace with</tspan>
    <tspan x="48" dy="18">tiling terminal &amp; browser panes.</tspan>
  </text>
  <rect class="tagbg" x="48" y="160" width="66" height="20" rx="10" />
  <text x="58" y="174" class="tag">terminal</text>
  <rect class="tagbg" x="122" y="160" width="92" height="20" rx="10" />
  <text x="132" y="174" class="tag">remote dev</text>

  <!-- ZeroG Toolbox card -->
  <rect class="card" x="452" y="46" width="404" height="150" rx="12" />
  <text x="476" y="86" class="title">⚡ ZeroG Toolbox</text>
  <text x="476" y="112" class="desc">
    <tspan x="476" dy="0">35+ privacy-first AI utilities that run</tspan>
    <tspan x="476" dy="18">100% in your browser. No uploads.</tspan>
  </text>
  <rect class="tagbg" x="476" y="160" width="84" height="20" rx="10" />
  <text x="486" y="174" class="tag">browser AI</text>
  <rect class="tagbg" x="568" y="160" width="92" height="20" rx="10" />
  <text x="578" y="174" class="tag">privacy-first</text>

  <!-- Catpuccino.ai card -->
  <rect class="card" x="24" y="216" width="404" height="150" rx="12" />
  <text x="48" y="256" class="title">📚 Catpuccino.ai</text>
  <text x="48" y="282" class="desc">
    <tspan x="48" dy="0">AI/ML tech blog — deep dives into</tspan>
    <tspan x="48" dy="18">frontier research papers.</tspan>
  </text>
  <rect class="tagbg" x="48" y="330" width="112" height="20" rx="10" />
  <text x="58" y="344" class="tag">AI/ML research</text>
  <rect class="tagbg" x="168" y="330" width="56" height="20" rx="10" />
  <text x="178" y="344" class="tag">blog</text>
</svg>
